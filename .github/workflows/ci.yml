name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: |
          cd web && npm ci
          cd ../web/apps/android && npm ci
      - name: Run lints
        run: |
          cd web && npm run lint
          cd ../web/apps/android && npm run lint
      - name: Run tests
        run: |
          cd web && npm run test
          cd ../web/apps/android && npm run test
      - name: Build web
        run: cd web && npm run build
      - name: Security audit
        run: |
          cd web && npm audit --audit-level high
          cd ../web/apps/android && npm audit --audit-level high
