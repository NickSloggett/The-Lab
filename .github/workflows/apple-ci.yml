name: Apple Platforms CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'apps/apple/**'
      - '.github/workflows/apple-ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'apps/apple/**'
      - '.github/workflows/apple-ci.yml'

jobs:
  lint:
    name: Lint & Format Check
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install Dependencies
        run: |
          brew install swiftlint swiftformat
      
      - name: SwiftLint
        working-directory: apps/apple
        run: swiftlint --strict
      
      - name: SwiftFormat Check
        working-directory: apps/apple
        run: swiftformat . --lint
  
  build-ios:
    name: Build iOS
    runs-on: macos-14
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.2.app
      
      - name: Install XcodeGen
        run: brew install xcodegen
      
      - name: Generate Xcode Project
        working-directory: apps/apple
        run: xcodegen generate
      
      - name: Build iOS
        working-directory: apps/apple
        run: |
          xcodebuild -project AppleApps.xcodeproj \
            -scheme iOS \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.2' \
            -configuration Debug \
            clean build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO
      
      - name: Test iOS
        working-directory: apps/apple
        run: |
          xcodebuild -project AppleApps.xcodeproj \
            -scheme iOS \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.2' \
            -configuration Debug \
            test \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO
  
  build-macos:
    name: Build macOS
    runs-on: macos-14
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.2.app
      
      - name: Install XcodeGen
        run: brew install xcodegen
      
      - name: Generate Xcode Project
        working-directory: apps/apple
        run: xcodegen generate
      
      - name: Build macOS
        working-directory: apps/apple
        run: |
          xcodebuild -project AppleApps.xcodeproj \
            -scheme macOS \
            -configuration Debug \
            clean build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO
  
  build-watchos:
    name: Build watchOS
    runs-on: macos-14
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.2.app
      
      - name: Install XcodeGen
        run: brew install xcodegen
      
      - name: Generate Xcode Project
        working-directory: apps/apple
        run: xcodegen generate
      
      - name: Build watchOS
        working-directory: apps/apple
        run: |
          xcodebuild -project AppleApps.xcodeproj \
            -scheme watchOS \
            -destination 'platform=watchOS Simulator,name=Apple Watch Series 9 (45mm),OS=10.2' \
            -configuration Debug \
            clean build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

  build-status:
    name: Build Status
    runs-on: ubuntu-latest
    needs: [build-ios, build-macos, build-watchos]
    if: always()
    steps:
      - name: Check build status
        run: |
          if [ "${{ needs.build-ios.result }}" == "success" ] && \
             [ "${{ needs.build-macos.result }}" == "success" ] && \
             [ "${{ needs.build-watchos.result }}" == "success" ]; then
            echo "✅ All builds passed!"
            exit 0
          else
            echo "❌ Some builds failed"
            exit 1
          fi